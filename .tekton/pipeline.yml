apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: ci-cd-pipeline

spec:
  workspaces:
    - name: output

  params:
    - name: repo-url
    - name: app-name
    - name: build-image

  tasks:

    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: clone
      runAfter: ["cleanup"]
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
      workspaces:
        - name: output
          workspace: output

    - name: lint
      runAfter: ["clone"]
      taskRef:
        name: flake8

      workspaces:
        - name: source
          workspace: output

    - name: test
      runAfter: ["lint"]
      taskRef:
        name: nose
      workspaces:
        - name: source
          workspace: output

    - name: build
      runAfter: ["test"]
      taskRef:
        name: buildah
      params:
        - name: IMAGE
          value: $(params.build-image)
      workspaces:
        - name: source
          workspace: output

    - name: deploy
      runAfter: ["build"]
      taskRef:
        name: openshift-client
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) --image=$(params.build-image) --dry-run=client -o yaml | oc apply -f -